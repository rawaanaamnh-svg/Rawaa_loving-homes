<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تواصل معنا | Loving Homes</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <div id="welcompoup" class="popup-overlay">
        <div class="popup-cont">
            <h2>مرحبا بك</h2>
            <p>اكتشف خدماتنا المميزة</p>
            <button class="pt1" onclick="closepopup()">اكتشف الان</button>
        </div>
    </div>



    <header id="header">
        <nav class="navbar">
            <a href="index.html">
                <img src="./Images/dog house.avif" class="logo" alt="شعار المنتجع">
            </a>
            
            <ul>
                <li><a href="index.html">الرئيسية</a></li>
                <li><a href="packages.html">الحزم</a></li>
                <li><a href="facilities.html">المرافق</a></li>
                <li><a href="contact.html">تواصل معنا</a></li>
                <li><a href="login.html">الدخول</a></li>
            </ul>
        </nav>
    </header>
    <main class="container">
        <section>
            <div class="form-contact">
                <h2 style="text-align: center; color: #333;">تواصل معنا</h2>
                <p style="text-align:center; font-size: 0.9rem; margin-bottom:20px;">
                    سيسعدنا الرد على استفساراتكم حول الحزم المخصصة
                </p>

                <form id="contactform">
                    <div class="form-group">
                        <label>الاسم الكامل</label>
                        <input type="text" name="name" id="userName" required placeholder="ادخل اسمك">
                    </div>

                    <div class="form-group">
                        <label>البريد الالكتروني</label>
                        <input type="email" name="email" id="userEmail" required placeholder="example@mail.com">
                    </div>

                    <div class="form-group">
                        <label>رقم الهاتف</label>
                        <input type="tel" name="usertel" id="usertel" placeholder="xxx xxx xxx">
                    </div>
                    
                    <div class="form-group">
                        <label>الرسالة</label>
                        <textarea name="userMsg" id="userMsg" rows="4" placeholder="كيف يمكننا مساعدتكم؟"></textarea>
                    </div>
                    
                    <button type="button" class="gold-btn" style="width: 100%; cursor: pointer;" onclick="checkForm()">ارسل الطلب</button>
                </form>
            </div>
        </section>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
